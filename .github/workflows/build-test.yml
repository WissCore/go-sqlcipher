# Reusable: invoked by .github/workflows/ci.yml. Builds and tests
# across OSes and Go versions. SQLCipher's cgo build needs only a C
# compiler and standard libs (no external OpenSSL — we use the
# vendored libtomcrypt crypto backend).
#
# Layout: one explicit job per OS rather than one matrix-on-OS job.
# GitHub Actions' run-page sidebar truncates per-matrix-instance names
# when the OS lives only in a matrix axis or include block; explicit
# top-level jobs each get their own sidebar entry with the full
# human-readable name. Pattern lifted from mattn/go-sqlite3's CI.
name: build-test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-x86_64:
    name: Linux x86_64 / go ${{ matrix.go }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        go: [oldstable, stable]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ matrix.go }}
      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -trimpath ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...

  linux-arm64:
    name: Linux ARM64 / go ${{ matrix.go }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        go: [oldstable, stable]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ matrix.go }}
      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -trimpath ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...

  macos-apple-silicon:
    name: macOS Apple Silicon / go ${{ matrix.go }}
    runs-on: macos-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        go: [oldstable, stable]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ matrix.go }}
      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -trimpath ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...

  windows-x86_64:
    name: Windows x86_64 / go ${{ matrix.go }}
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: 'msys2 {0}'
    strategy:
      fail-fast: false
      matrix:
        go: [oldstable, stable]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - name: Set up MSYS2 + MinGW-w64
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c  # v2.31.1
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain
          path-type: inherit
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ matrix.go }}
      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -trimpath ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...
