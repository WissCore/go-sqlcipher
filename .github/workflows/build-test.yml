# Reusable: invoked by .github/workflows/ci.yml. Builds and tests
# across an OS × Go matrix. SQLCipher's cgo build needs only a C
# compiler and standard libs (no external OpenSSL — we use the
# vendored libtomcrypt crypto backend).
#
# Layout: Unix and Windows are separate jobs because Windows requires
# the MSYS2/MinGW toolchain (the Go-shipped gcc detection on Windows
# is brittle; MSYS2 is the upstream-recommended pattern, mirrored from
# mattn/go-sqlite3's own CI).
name: build-test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unix:
    name: ${{ matrix.label }} / go ${{ matrix.go }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Each include row pairs a runner label with a human-readable
        # name that shows up in the PR checks UI. ubuntu-latest is
        # x86_64; ubuntu-24.04-arm is the GitHub-hosted ARM64 runner
        # (GA in private repos as of 2026-01); macos-latest is Apple
        # Silicon (arm64). All have cgo + race-detector support.
        # `oldstable` and `stable` track Go's two officially supported
        # releases via setup-go aliases.
        include:
          - {os: ubuntu-latest, label: "Linux x86_64", go: oldstable}
          - {os: ubuntu-latest, label: "Linux x86_64", go: stable}
          - {os: ubuntu-24.04-arm, label: "Linux ARM64", go: oldstable}
          - {os: ubuntu-24.04-arm, label: "Linux ARM64", go: stable}
          - {os: macos-latest, label: "macOS Apple Silicon", go: oldstable}
          - {os: macos-latest, label: "macOS Apple Silicon", go: stable}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ matrix.go }}

      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -trimpath ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...

  windows:
    name: Windows x86_64 / go ${{ matrix.go }}
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: 'msys2 {0}'
    strategy:
      fail-fast: false
      matrix:
        go: [oldstable, stable]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up MSYS2 + MinGW-w64
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c  # v2.31.1
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain
          path-type: inherit

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ matrix.go }}

      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -trimpath ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...
