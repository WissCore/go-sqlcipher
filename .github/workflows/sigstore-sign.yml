# Triggered on every release tag (v*).
#
# Job layout (each artifact is recognised by a different verifier):
#   build      Generates a source tarball pinned to the tag, an SBOM
#              for the Go module + transitive deps, signs the tarball
#              with cosign keyless (Rekor-anchored .sigstore.json
#              bundle), and attaches GitHub-native build/SBOM
#              attestations (gh attestation verify UX).
#   provenance Calls the SLSA generic generator to emit a .intoto.jsonl
#              provenance file alongside the tarball. Required for
#              OpenSSF Scorecard's releasesHaveProvenance probe, which
#              recognises .intoto.jsonl on release assets.
#
# Go libraries don't have a single binary to sign; the source tarball
# is the "artifact" consumers fetch (via the Go module proxy), and
# signing it gives downstream auditors a verifiable hash chain back
# to the tag.
name: sigstore-sign

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          cache: false  # release pipeline: avoid cache poisoning into signed artifacts

      - name: Build source tarball
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          # `git archive` reproduces the tree at the tag without
          # build artefacts or VCS metadata. The same command on the
          # same SHA produces a byte-identical tarball, so the cosign
          # signature is reproducible by anyone with read access to
          # the tag.
          git archive --format=tar.gz --prefix="go-sqlcipher-${TAG}/" \
            -o "dist/go-sqlcipher-${TAG}.tar.gz" "${TAG}"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: ./
          format: spdx-json
          output-file: dist/go-sqlcipher.spdx.json
          upload-release-assets: false

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign source tarball (keyless, bundle)
        env:
          TAG: ${{ github.ref_name }}
        working-directory: dist
        run: |
          cosign sign-blob --yes \
            --bundle "go-sqlcipher-${TAG}.sigstore.json" \
            "go-sqlcipher-${TAG}.tar.gz"

      - name: Attest build provenance
        env:
          TAG: ${{ github.ref_name }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4
        with:
          subject-path: dist/go-sqlcipher-${{ github.ref_name }}.tar.gz

      - name: Attest SBOM
        env:
          TAG: ${{ github.ref_name }}
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e  # v4
        with:
          subject-path: dist/go-sqlcipher-${{ github.ref_name }}.tar.gz
          sbom-path: dist/go-sqlcipher.spdx.json

      - name: Compute artifact hash for provenance job
        id: hash
        env:
          TAG: ${{ github.ref_name }}
        working-directory: dist
        run: |
          echo "hashes=$(sha256sum "go-sqlcipher-${TAG}.tar.gz" | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "${TAG}" \
            "dist/go-sqlcipher-${TAG}.tar.gz" \
            "dist/go-sqlcipher.spdx.json" \
            "dist/go-sqlcipher-${TAG}.sigstore.json" \
            --repo "${{ github.repository }}" \
            --clobber

  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    # SLSA trusted-builder is identified by tag ref; pinning by SHA
    # breaks both slsa-verifier's BuilderID check AND the upstream
    # builder-fetch.sh download (slsa-framework/slsa-github-generator#4216,
    # error: "slsa-generator-generic-linux-amd64: No such file or
    # directory"). The version tag is the load-bearing pin here.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0  # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true
