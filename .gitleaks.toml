title = "go-sqlcipher gitleaks config"

# Inherit the upstream rule set; only narrow allowlists added here.
[extend]
useDefault = true

[allowlist]
description = "Vendored upstream sources and documented PRAGMA examples"

# 1. Vendored upstream sources are not ours to scan. The SQLCipher
#    amalgamation is generated by upstream `make sqlite3.c` and contains
#    high-entropy C constants that look like API keys to gitleaks but
#    are normal SQLite internals (column iKey constants, sqlite3_api
#    function pointer table, etc.). Real secrets cannot live in this
#    file because every byte is mechanically generated from public
#    sources every time we run `make update-sqlcipher`.
paths = [
  '''sqlite3\.c''',
  '''sqlite3\.h''',
]

# 2. The canonical 64-character SQLCipher PRAGMA hex example key. This
#    exact value appears in upstream SQLCipher documentation, in
#    Zetetic's official examples, and in our README/test code as the
#    documented way to demonstrate the API. It is not a secret;
#    publishing it does not compromise anything.
regexes = [
  '''2DD29CA851E7B56E4697B0E1F08507293D761A05CE4D1B628663F411A8086D99''',
]
