gofumpt      = "gofumpt"
gofmt        = "gofmt"
golangci     = "golangci"
shfmt        = "shfmt"
shellcheck   = "shellcheck"
gitleaks     = "gitleaks"
trufflehog   = "trufflehog"
zizmor       = "zizmor"
sigstore     = "sigstore"
addlicense   = "addlicense"
markdownlint = "markdownlint"
yamllint     = "yamllint"
